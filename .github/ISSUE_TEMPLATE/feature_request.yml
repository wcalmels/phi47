name: Feature request
description: Propose a software, documentation, or research capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: validation
    attributes:
      label: Suggested validation criteria
      description: Explain how the feature could be tested objectively.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: The proposal is consistent with the scientific status policy.
          required: true
        - label: The proposal does not present speculation as validation.
          required: true
